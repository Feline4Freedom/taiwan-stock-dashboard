<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股全景儀表板 | Roger 投資包</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/standalone/umd/vis-network.min.js"></script>
<style>
  :root{
    --bg:#0a0e1a; --bg2:#111827; --bg3:#1a2236; --line:#1f2937;
    --text:#e5e7eb; --muted:#9ca3af; --dim:#6b7280;
    --accent:#60a5fa; --accent2:#a78bfa; --good:#34d399; --bad:#f87171; --warn:#fbbf24;
    --semi:#3b82f6; --comp:#8b5cf6; --comm:#06b6d4; --opto:#f59e0b; --ec:#ec4899;
    --ed:#10b981; --is:#14b8a6; --oe:#f97316;
    --fin:#eab308; --food:#84cc16; --plas:#a855f7; --tex:#d946ef; --em:#22d3ee;
    --ec_cab:#fb7185; --chem:#ef4444; --bio:#34d399; --glass:#94a3b8; --paper:#cbd5e1;
    --steel:#64748b; --rub:#fca5a5; --auto:#dc2626; --build:#fdba74; --ship:#0ea5e9;
    --tour:#f472b6; --trade:#fde047; --oil:#facc15; --green:#4ade80; --etf:#c084fc;
    --other:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",Arial,sans-serif;
    background:var(--bg);color:var(--text);overflow:hidden;
  }
  #app{display:grid;grid-template-rows:auto 1fr;height:100vh}

  /* Header */
  header{
    background:linear-gradient(180deg,#0f1729,#0a0e1a);
    border-bottom:1px solid var(--line);
    padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  header h1{font-size:16px;font-weight:600;color:#fff;letter-spacing:.5px}
  header h1 .sub{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px}
  .search{flex:1;max-width:420px;position:relative}
  .search input{
    width:100%;padding:8px 12px 8px 32px;border-radius:8px;
    border:1px solid var(--line);background:var(--bg2);color:var(--text);font-size:13px;
  }
  .search input:focus{outline:none;border-color:var(--accent)}
  .search::before{content:"🔍";position:absolute;left:10px;top:7px;opacity:.6}
  .stats{display:flex;gap:14px;font-size:12px;color:var(--muted)}
  .stats b{color:var(--text)}
  .tabs{display:flex;gap:4px}
  .tab{
    padding:6px 14px;border-radius:6px;background:transparent;border:1px solid var(--line);
    color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s;
  }
  .tab:hover{color:var(--text);border-color:var(--accent)}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#0a0e1a;font-weight:500}

  /* Layout */
  main{display:grid;grid-template-columns:240px 1fr;height:100%;overflow:hidden}
  aside{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;padding:12px 8px}
  aside h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:8px 8px 4px}
  .sector-item{
    display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;
    cursor:pointer;font-size:13px;color:var(--text);
  }
  .sector-item:hover{background:var(--bg3)}
  .sector-item.active{background:var(--bg3);color:#fff}
  .sector-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .sector-count{margin-left:auto;color:var(--dim);font-size:11px}
  .legend{padding:12px 8px;border-top:1px solid var(--line);margin-top:12px}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);padding:3px 8px}
  .edge-line{width:24px;height:2px;border-radius:1px}

  /* View area */
  .view{position:relative;overflow:hidden;background:var(--bg)}
  .view.hidden{display:none}
  #graph{width:100%;height:100%}

  /* Sector grid view */
  #grid-view{padding:16px;overflow-y:auto;height:100%}
  .sector-block{
    background:var(--bg2);border:1px solid var(--line);border-radius:10px;
    padding:14px;margin-bottom:14px;
  }
  .sector-block h2{
    font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:10px;
    padding-bottom:8px;border-bottom:1px solid var(--line);
  }
  .sector-block h2 .badge{
    margin-left:auto;background:var(--bg3);padding:2px 8px;border-radius:10px;
    font-size:11px;color:var(--muted);font-weight:400;
  }
  .company-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;
  }
  .company-card{
    background:var(--bg3);border:1px solid transparent;border-radius:6px;
    padding:6px 10px;cursor:pointer;transition:all .12s;
  }
  .company-card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .company-card .code{font-size:11px;color:var(--muted);font-family:'SF Mono',Menlo,monospace}
  .company-card .name{font-size:13px;color:var(--text);font-weight:500}

  /* Detail panel */
  #detail{
    position:fixed;right:0;top:0;bottom:0;width:420px;background:var(--bg2);
    border-left:1px solid var(--line);transform:translateX(100%);
    transition:transform .25s ease;z-index:50;overflow-y:auto;
    box-shadow:-12px 0 30px rgba(0,0,0,.5);
  }
  #detail.open{transform:translateX(0)}
  .detail-header{
    padding:18px 20px;background:linear-gradient(180deg,#1a2236,#111827);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:2;
  }
  .detail-close{
    position:absolute;top:12px;right:12px;background:transparent;border:none;
    color:var(--muted);font-size:22px;cursor:pointer;width:30px;height:30px;border-radius:6px;
  }
  .detail-close:hover{background:var(--bg3);color:#fff}
  .detail-code{font-size:12px;color:var(--muted);font-family:'SF Mono',Menlo,monospace}
  .detail-name{font-size:22px;font-weight:600;color:#fff;margin:4px 0}
  .detail-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;background:var(--bg3);color:var(--text)}
  .detail-body{padding:16px 20px}
  .detail-section{margin-bottom:18px}
  .detail-section h4{
    font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;
  }
  .detail-section h4::before{content:"";width:3px;height:11px;background:var(--accent);border-radius:1px}
  .detail-section p{font-size:13px;line-height:1.6;color:var(--text)}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .info-cell{background:var(--bg3);padding:8px 10px;border-radius:6px}
  .info-cell .label{font-size:10px;color:var(--muted);margin-bottom:2px}
  .info-cell .value{font-size:13px;color:var(--text);font-weight:500}
  .related-list{display:flex;flex-wrap:wrap;gap:5px}
  .related-chip{
    background:var(--bg3);padding:4px 8px;border-radius:5px;font-size:12px;
    cursor:pointer;border:1px solid transparent;transition:all .12s;
  }
  .related-chip:hover{border-color:var(--accent);background:var(--bg)}
  .related-chip .code{color:var(--muted);font-size:10px;margin-right:4px;font-family:'SF Mono',Menlo,monospace}
  .related-chip .rel-type{font-size:9px;color:var(--accent);margin-left:4px}
  .ext-links{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .ext-link{
    background:var(--bg3);border:1px solid var(--line);padding:8px;border-radius:6px;
    text-decoration:none;color:var(--text);font-size:12px;text-align:center;transition:all .12s;
  }
  .ext-link:hover{border-color:var(--accent);background:var(--bg)}
  .ext-link b{display:block;font-size:13px;margin-bottom:2px;color:var(--accent)}
  .ext-link span{font-size:10px;color:var(--muted)}

  /* Toolbar overlay on graph */
  .graph-tools{
    position:absolute;top:12px;left:12px;background:rgba(17,24,39,.85);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:8px;padding:8px;display:flex;gap:6px;flex-wrap:wrap;
    max-width:380px;
  }
  .graph-tools .toggle{
    padding:4px 10px;border:1px solid var(--line);background:var(--bg3);color:var(--text);
    border-radius:5px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;
  }
  .graph-tools .toggle.active{background:var(--accent);color:#0a0e1a;border-color:var(--accent)}
  .graph-info{
    position:absolute;bottom:12px;left:12px;background:rgba(17,24,39,.85);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);
    max-width:300px;line-height:1.5;
  }
  .graph-info b{color:var(--text)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#374151}

  .disclaimer{
    background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);
    padding:10px 14px;margin:10px 16px 0;border-radius:8px;font-size:12px;color:var(--warn);
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>台股全景儀表板<span class="sub">300 大台股 · 產業/集團/供應鏈關係網</span></h1>
    <div class="search"><input type="text" id="search" placeholder="搜尋股號或公司名稱（例：2330、台積電）"></div>
    <div class="stats">
      <span>公司 <b id="stat-company">--</b></span>
      <span>產業 <b id="stat-sector">--</b></span>
      <span>連結 <b id="stat-link">--</b></span>
    </div>
    <div class="tabs">
      <button class="tab active" data-view="graph">關係網路圖</button>
      <button class="tab" data-view="grid">產業總覽</button>
    </div>
  </header>
  <main>
    <aside>
      <h3>產業分類</h3>
      <div id="sector-list"></div>
      <div class="legend">
        <h3>連結類型</h3>
        <div class="legend-item"><div class="edge-line" style="background:#60a5fa"></div>供應鏈</div>
        <div class="legend-item"><div class="edge-line" style="background:#a78bfa"></div>同產業</div>
        <div class="legend-item"><div class="edge-line" style="background:#f59e0b"></div>集團/控股</div>
        <div class="legend-item"><div class="edge-line" style="background:#34d399;border-top:1px dashed #34d399;background:transparent;height:0"></div>歷史相關性</div>
      </div>
    </aside>
    <div class="view" id="graph-view">
      <div class="graph-tools">
        <button class="toggle active" data-edge="supply">供應鏈</button>
        <button class="toggle active" data-edge="industry">同產業</button>
        <button class="toggle active" data-edge="group">集團</button>
        <button class="toggle" data-edge="correlation">相關性</button>
        <button class="toggle" id="reset-zoom" style="border-color:var(--accent);color:var(--accent)">↺ 重置</button>
      </div>
      <div id="graph"></div>
      <div class="graph-info">
        <b>互動：</b>滾輪縮放 · 拖曳節點 · 點擊查看詳情<br>
        <b>節點大小：</b>市值/重要性 · <b>顏色：</b>所屬產業
      </div>
    </div>
    <div class="view hidden" id="grid-view"></div>
  </main>
</div>

<aside id="detail">
  <div class="detail-header">
    <button class="detail-close" id="detail-close">×</button>
    <div class="detail-code" id="d-code"></div>
    <div class="detail-name" id="d-name"></div>
    <div id="d-tags"></div>
  </div>
  <div class="detail-body">
    <div class="detail-section">
      <h4>主要業務</h4>
      <p id="d-business"></p>
    </div>
    <div class="detail-section">
      <h4>基本資料</h4>
      <div class="info-grid" id="d-info"></div>
    </div>
    <div class="detail-section">
      <h4>產品與服務</h4>
      <p id="d-products"></p>
    </div>
    <div class="detail-section">
      <h4>所屬集團 / 控股結構</h4>
      <p id="d-group"></p>
    </div>
    <div class="detail-section">
      <h4>相關公司</h4>
      <div class="related-list" id="d-related"></div>
    </div>
    <div class="detail-section">
      <h4>即時行情與財報（外部連結）</h4>
      <p style="color:var(--muted);font-size:11px;margin-bottom:8px">本儀表板焦點在結構與關係。即時股價、本益比、財報請點擊下列連結。</p>
      <div class="ext-links" id="d-links"></div>
    </div>
  </div>
</aside>

<script>
/* ============================================================
   資料：產業分類定義
   ============================================================ */
const SECTORS = {
  "半導體":      { color:"#3b82f6", icon:"🔬" },
  "電腦及週邊":  { color:"#8b5cf6", icon:"💻" },
  "光電":        { color:"#f59e0b", icon:"💡" },
  "通信網路":    { color:"#06b6d4", icon:"📡" },
  "電子零組件":  { color:"#ec4899", icon:"🔌" },
  "電子通路":    { color:"#10b981", icon:"📦" },
  "資訊服務":    { color:"#14b8a6", icon:"☁️" },
  "其他電子":    { color:"#f97316", icon:"⚙️" },
  "金融保險":    { color:"#eab308", icon:"🏦" },
  "食品":        { color:"#84cc16", icon:"🍱" },
  "塑膠":        { color:"#a855f7", icon:"🧪" },
  "紡織纖維":    { color:"#d946ef", icon:"🧵" },
  "電機機械":    { color:"#22d3ee", icon:"🔧" },
  "電器電纜":    { color:"#fb7185", icon:"⚡" },
  "化學工業":    { color:"#ef4444", icon:"🧬" },
  "生技醫療":    { color:"#34d399", icon:"💊" },
  "玻璃陶瓷":    { color:"#94a3b8", icon:"🪟" },
  "造紙":        { color:"#cbd5e1", icon:"📜" },
  "鋼鐵":        { color:"#64748b", icon:"🏗️" },
  "橡膠":        { color:"#fca5a5", icon:"🛞" },
  "汽車":        { color:"#dc2626", icon:"🚗" },
  "建材營造":    { color:"#fdba74", icon:"🏢" },
  "航運":        { color:"#0ea5e9", icon:"🚢" },
  "觀光餐旅":    { color:"#f472b6", icon:"🏨" },
  "貿易百貨":    { color:"#fde047", icon:"🛍️" },
  "油電燃氣":    { color:"#facc15", icon:"⛽" },
  "綠能環保":    { color:"#4ade80", icon:"🌱" },
  "水泥":        { color:"#a8a29e", icon:"🧱" },
  "ETF/指數":    { color:"#c084fc", icon:"📊" },
  "其他":        { color:"#6b7280", icon:"📁" },
};

/* COMPANIES 資料庫稍後注入 */
window.COMPANIES = [];
window.LINKS = [];
</script>

<script src="data.js"></script>

<script>
/* ============================================================
   應用邏輯
   ============================================================ */
const $ = id => document.getElementById(id);
const sectorList = $("sector-list");
const sectorCounts = {};
COMPANIES.forEach(c => sectorCounts[c.sector] = (sectorCounts[c.sector]||0)+1);

let activeFilter = null; // 產業篩選
const edgeFilter = { supply:true, industry:true, group:true, correlation:false };

/* 側邊欄產業列表 */
function renderSectorList(){
  sectorList.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'sector-item' + (activeFilter===null?' active':'');
  all.innerHTML = `<div class="sector-dot" style="background:#9ca3af"></div>全部產業<span class="sector-count">${COMPANIES.length}</span>`;
  all.onclick = () => { activeFilter=null; renderSectorList(); applyFilter(); };
  sectorList.appendChild(all);

  // 依公司數排序
  const sorted = Object.keys(SECTORS).filter(s=>sectorCounts[s]).sort((a,b)=>sectorCounts[b]-sectorCounts[a]);
  sorted.forEach(s => {
    const it = document.createElement('div');
    it.className = 'sector-item' + (activeFilter===s?' active':'');
    it.innerHTML = `<div class="sector-dot" style="background:${SECTORS[s].color}"></div>${SECTORS[s].icon} ${s}<span class="sector-count">${sectorCounts[s]||0}</span>`;
    it.onclick = () => { activeFilter = (activeFilter===s?null:s); renderSectorList(); applyFilter(); };
    sectorList.appendChild(it);
  });
}

/* 統計 */
function updateStats(){
  $("stat-company").textContent = COMPANIES.length;
  $("stat-sector").textContent = Object.keys(sectorCounts).length;
  $("stat-link").textContent = LINKS.length;
}

/* ============================================================
   網路圖（vis-network）
   ============================================================ */
let network = null;
function buildGraph(){
  const nodes = COMPANIES.map(c => {
    const sc = SECTORS[c.sector] || SECTORS["其他"];
    const size = c.rank ? Math.max(8, 32 - Math.log2(c.rank)*3) : 12;
    return {
      id: c.code,
      label: c.name,
      title: `${c.code} ${c.name}\n${c.sector}\n${c.business||''}`,
      group: c.sector,
      color: { background: sc.color, border:'#0a0e1a', highlight:{background:'#fff',border:sc.color} },
      font: { color:'#e5e7eb', size:11, face:'PingFang TC, Microsoft JhengHei, sans-serif' },
      size: size,
      borderWidth: 1,
    };
  });
  const edges = LINKS.map((e,i) => {
    const colorMap = { supply:'#60a5fa', industry:'#7c3aed', group:'#f59e0b', correlation:'#34d399' };
    const dashMap = { correlation:[4,4] };
    return {
      id: `e${i}`,
      from: e[0], to: e[1], type: e[2], label: e[3]||'',
      color: { color: colorMap[e[2]]||'#6b7280', opacity: e[2]==='industry'?0.25:0.55 },
      dashes: dashMap[e[2]] || false,
      width: e[2]==='supply'?1.6: e[2]==='group'?1.4: 0.8,
      smooth: { type: 'continuous' },
      font: { color:'#9ca3af', size:9, strokeWidth:0, background:'rgba(0,0,0,0)' },
      arrows: e[2]==='supply' ? { to:{enabled:true, scaleFactor:.4} } : (e[2]==='group'?{to:{enabled:true,scaleFactor:.4,type:'circle'}}:undefined),
    };
  });
  const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  const options = {
    physics: {
      solver:'forceAtlas2Based',
      forceAtlas2Based:{ gravitationalConstant:-55, centralGravity:0.012, springLength:90, springConstant:0.05, damping:0.5, avoidOverlap:0.3 },
      stabilization:{ iterations:200 },
    },
    interaction: { hover:true, tooltipDelay:160, navigationButtons:false, multiselect:false, zoomView:true },
    nodes: { shape:'dot' },
    edges: { selectionWidth:2, hoverWidth:0.5 },
  };
  network = new vis.Network($("graph"), data, options);
  network.on('click', e => {
    if(e.nodes.length){
      const code = e.nodes[0];
      openDetail(code);
    }
  });
  network.on('stabilizationIterationsDone', ()=> network.setOptions({ physics:false }));
}

function applyFilter(){
  if(!network) return;
  const visibleCodes = new Set(
    COMPANIES.filter(c => !activeFilter || c.sector===activeFilter).map(c=>c.code)
  );
  // toggle node visibility via update
  const allNodes = network.body.data.nodes.get();
  allNodes.forEach(n => {
    n.hidden = !visibleCodes.has(n.id);
  });
  network.body.data.nodes.update(allNodes);

  const allEdges = network.body.data.edges.get();
  allEdges.forEach(ed => {
    ed.hidden = !visibleCodes.has(ed.from) || !visibleCodes.has(ed.to) || !edgeFilter[ed.type];
  });
  network.body.data.edges.update(allEdges);
}

/* edge filter buttons */
document.querySelectorAll('.graph-tools .toggle[data-edge]').forEach(btn => {
  btn.onclick = () => {
    const t = btn.dataset.edge;
    edgeFilter[t] = !edgeFilter[t];
    btn.classList.toggle('active', edgeFilter[t]);
    applyFilter();
  };
});
$("reset-zoom").onclick = () => { if(network) network.fit({ animation:{ duration:500, easingFunction:'easeInOutQuad'}}); };

/* ============================================================
   詳情面板
   ============================================================ */
function openDetail(code){
  const c = COMPANIES.find(x => x.code===code);
  if(!c) return;
  const sc = SECTORS[c.sector] || SECTORS["其他"];
  $("d-code").textContent = c.code;
  $("d-name").textContent = c.name;
  $("d-tags").innerHTML = `
    <span class="detail-tag" style="background:${sc.color}33;color:${sc.color}">${sc.icon} ${c.sector}</span>
    ${c.subSector?`<span class="detail-tag" style="margin-left:6px">${c.subSector}</span>`:''}
    ${c.group?`<span class="detail-tag" style="margin-left:6px">🏷️ ${c.group}</span>`:''}
  `;
  $("d-business").textContent = c.business || '—';
  $("d-info").innerHTML = `
    <div class="info-cell"><div class="label">股票代號</div><div class="value">${c.code}</div></div>
    <div class="info-cell"><div class="label">市場</div><div class="value">${c.market||'TWSE'}</div></div>
    <div class="info-cell"><div class="label">所屬產業</div><div class="value">${c.sector}</div></div>
    <div class="info-cell"><div class="label">市值排名（約）</div><div class="value">${c.rank?'#'+c.rank:'—'}</div></div>
    ${c.founded?`<div class="info-cell"><div class="label">成立年份</div><div class="value">${c.founded}</div></div>`:''}
    ${c.chairman?`<div class="info-cell"><div class="label">董事長</div><div class="value">${c.chairman}</div></div>`:''}
  `;
  $("d-products").textContent = (c.products && c.products.length) ? c.products.join('、') : '—';
  $("d-group").textContent = c.groupNote || (c.group ? `屬 ${c.group} 集團相關企業。` : '無集團從屬，獨立公司。');

  /* 相關公司 */
  const related = [];
  LINKS.forEach(e => {
    if(e[0]===code) related.push({ code:e[1], type:e[2], note:e[3] });
    else if(e[1]===code) related.push({ code:e[0], type:e[2], note:e[3] });
  });
  // 加上同集團
  if(c.group) {
    COMPANIES.filter(x => x.group===c.group && x.code!==code).forEach(x => {
      if(!related.find(r=>r.code===x.code)) related.push({ code:x.code, type:'group', note:'同集團' });
    });
  }
  // 加上同產業（取前 8 個）
  COMPANIES.filter(x => x.sector===c.sector && x.code!==code).slice(0,8).forEach(x => {
    if(!related.find(r=>r.code===x.code)) related.push({ code:x.code, type:'industry', note:'同產業' });
  });

  const typeName = { supply:'供應鏈', industry:'同產業', group:'集團', correlation:'相關性' };
  const typeColor = { supply:'#60a5fa', industry:'#a78bfa', group:'#f59e0b', correlation:'#34d399' };
  $("d-related").innerHTML = related.slice(0,40).map(r => {
    const t = COMPANIES.find(x=>x.code===r.code);
    if(!t) return '';
    return `<span class="related-chip" data-code="${r.code}">
      <span class="code">${r.code}</span>${t.name}
      <span class="rel-type" style="color:${typeColor[r.type]}">·${typeName[r.type]||''}</span>
    </span>`;
  }).join('');
  document.querySelectorAll('#d-related .related-chip').forEach(el => {
    el.onclick = () => openDetail(el.dataset.code);
  });

  /* 外部連結 */
  $("d-links").innerHTML = `
    <a class="ext-link" target="_blank" href="https://goodinfo.tw/tw/StockDetail.asp?STOCK_ID=${c.code}">
      <b>Goodinfo</b><span>本益比·財報·配息</span>
    </a>
    <a class="ext-link" target="_blank" href="https://tw.stock.yahoo.com/quote/${c.code}.TW">
      <b>Yahoo 股市</b><span>即時行情·新聞</span>
    </a>
    <a class="ext-link" target="_blank" href="https://mops.twse.com.tw/mops/web/t05st01?step=1&firstin=1&off=1&keyword4=&code1=&TYPEK2=&checkbtn=&queryName=co_id&inpuType=co_id&TYPEK=all&isnew=false&co_id=${c.code}">
      <b>公開資訊觀測站</b><span>正式財報·公告</span>
    </a>
    <a class="ext-link" target="_blank" href="https://www.cnyes.com/twstock/${c.code}">
      <b>鉅亨網</b><span>技術線圖·分析</span>
    </a>
    <a class="ext-link" target="_blank" href="https://histock.tw/stock/${c.code}">
      <b>Histock</b><span>K線·籌碼</span>
    </a>
    <a class="ext-link" target="_blank" href="https://www.wantgoo.com/stock/${c.code}">
      <b>玩股網</b><span>三大法人·主力</span>
    </a>
  `;
  $("detail").classList.add('open');
}
$("detail-close").onclick = () => $("detail").classList.remove('open');

/* ============================================================
   產業總覽 grid
   ============================================================ */
function renderGrid(){
  const view = $("grid-view");
  view.innerHTML = '';
  const sorted = Object.keys(SECTORS).filter(s=>sectorCounts[s]).sort((a,b)=>sectorCounts[b]-sectorCounts[a]);
  sorted.forEach(s => {
    const cs = COMPANIES.filter(c=>c.sector===s).sort((a,b)=>(a.rank||999)-(b.rank||999));
    const block = document.createElement('div');
    block.className = 'sector-block';
    block.innerHTML = `
      <h2><div class="sector-dot" style="background:${SECTORS[s].color}"></div>${SECTORS[s].icon} ${s}<span class="badge">${cs.length} 家</span></h2>
      <div class="company-grid">
        ${cs.map(c => `<div class="company-card" data-code="${c.code}">
          <div class="code">${c.code}</div><div class="name">${c.name}</div>
        </div>`).join('')}
      </div>`;
    view.appendChild(block);
  });
  view.querySelectorAll('.company-card').forEach(el => {
    el.onclick = () => openDetail(el.dataset.code);
  });
}

/* tab 切換 */
document.querySelectorAll('.tabs .tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tabs .tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const v = t.dataset.view;
    $("graph-view").classList.toggle('hidden', v!=='graph');
    $("grid-view").classList.toggle('hidden', v!=='grid');
    if(v==='graph' && network) network.redraw();
  };
});

/* 搜尋 */
$("search").addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if(!q){ applyFilter(); return; }
  const matched = COMPANIES.filter(c => c.code.includes(q) || c.name.toLowerCase().includes(q) || (c.business||'').toLowerCase().includes(q));
  if(matched.length===1){ openDetail(matched[0].code); return; }
  if(network){
    const codes = new Set(matched.map(c=>c.code));
    const allNodes = network.body.data.nodes.get();
    allNodes.forEach(n => { n.hidden = !codes.has(n.id); });
    network.body.data.nodes.update(allNodes);
    const allEdges = network.body.data.edges.get();
    allEdges.forEach(ed => { ed.hidden = !codes.has(ed.from) || !codes.has(ed.to); });
    network.body.data.edges.update(allEdges);
  }
});

/* init */
window.addEventListener('DOMContentLoaded', () => {
  if(!window.COMPANIES.length){
    document.body.innerHTML = '<div style="padding:40px;color:#fff">資料載入失敗：請確認 「data.js」 與此 HTML 在同一資料夾。</div>';
    return;
  }
  renderSectorList();
  updateStats();
  renderGrid();
  buildGraph();
});
</script>
</body>
