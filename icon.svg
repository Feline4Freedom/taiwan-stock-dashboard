<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- iOS rounded corner is auto-applied; fill full bounds -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 網路關係圖節點 -->
  <g stroke="url(#line)" stroke-width="3" stroke-opacity="0.6" fill="none">
    <line x1="180" y1="180" x2="320" y2="220"/>
    <line x1="320" y1="220" x2="380" y2="160"/>
    <line x1="320" y1="220" x2="280" y2="340"/>
    <line x1="280" y1="340" x2="160" y2="320"/>
    <line x1="180" y1="180" x2="160" y2="320"/>
    <line x1="320" y1="220" x2="400" y2="320"/>
  </g>
  <g>
    <circle cx="180" cy="180" r="20" fill="#60a5fa"/>
    <circle cx="320" cy="220" r="32" fill="#fff"/>
    <circle cx="380" cy="160" r="14" fill="#a78bfa"/>
    <circle cx="280" cy="340" r="22" fill="#34d399"/>
    <circle cx="160" cy="320" r="16" fill="#f59e0b"/>
    <circle cx="400" cy="320" r="14" fill="#ec4899"/>
  </g>
  <!-- 中央「台」字 -->
  <text x="320" y="240" font-family="PingFang TC, Microsoft JhengHei, sans-serif"
        font-size="42" font-weight="700" fill="#0f1729" text-anchor="middle">台</text>
</svg>
